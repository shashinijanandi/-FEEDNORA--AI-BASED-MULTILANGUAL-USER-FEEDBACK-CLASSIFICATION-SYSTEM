version: '3.9'

services:
  # ─── PostgreSQL Database ───────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: feedback_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: feedback_analytics
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: feedback_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-password}@db:5432/feedback_analytics
      MODEL_PATH: ai_models/sentiment_model.pkl
      VECTORIZER_PATH: ai_models/vectorizer.pkl
    volumes:
      - ./ai_models:/app/ai_models:ro   # Mount your trained model files here
      - backend_logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── React Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: feedback_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  # ─── pgAdmin (optional, dev only) ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: feedback_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    profiles:
      - dev
    depends_on:
      - db

volumes:
  postgres_data:
  backend_logs:
