version: "3.9"

services:

  # ─── PostgreSQL 16 ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: feedbackai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB:       ${POSTGRES_DB:-feedbackai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-feedbackai}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - feedbackai_net

  # ─── pgAdmin (dev only) ─────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: feedbackai_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL:    admin@feedbackai.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - feedbackai_net
    profiles:
      - dev

  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: feedbackai_backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-feedbackai}
      # Trained topic CSV + PNGs: host folder feednora/artifacts → /artifacts in container
      TOPIC_OUTPUT_CSV_PATH: /artifacts/topics.csv
      TOPIC_DATASET_CSV_PATH: /artifacts/labeled_feedback.csv
      TOPIC_ARTIFACTS_DIR: /artifacts
    volumes:
      - ./backend/ai_models:/app/ai_models:ro
      # Repo layout: …/feednora/artifacts next to …/feednora/feedback-ai-platform-v3 (4)/feedback-ai-platform
      - ../../artifacts:/artifacts:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - feedbackai_net

  # ─── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: feedbackai_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - feedbackai_net

volumes:
  postgres_data:
    driver: local

networks:
  feedbackai_net:
    driver: bridge
